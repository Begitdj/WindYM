name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Sign APK
      run: |
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "KEYSTORE_BASE64 secret is not set. Skipping signing."
          exit 0
        fi
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks
        BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
        $BUILD_TOOLS/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
        $BUILD_TOOLS/apksigner sign --ks app/release.jks --ks-key-alias "${{ secrets.KEY_ALIAS }}" --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" --key-pass "pass:${{ secrets.KEY_PASSWORD }}" app/build/outputs/apk/release/app-release.apk
        rm app/release.jks
        rm app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v6
      with:
        name: WindYM-Release
        path: app/build/outputs/apk/release/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest
        name: Последняя сборка (Latest)
        body: Автоматическая сборка приложения WindYM
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
